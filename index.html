<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองห้องประชุม - โรงเรียนพิมานพิทยาสรรค์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f0f4f8;
        }
        
        .banner-meeting-bg {
            background-image: linear-gradient(rgba(0, 29, 61, 0.66), rgba(0, 29, 61, 0.66)), 
                              url('https://raw.githubusercontent.com/phiman-2026/picture/main/BGMeeting.png');
            background-size: cover;
            background-position: center;
        }

        .calendar-wrapper {
            border: 4px solid #001d3d;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            background-color: white;
            overflow: hidden;
            width: 100%;
        }
        .calendar-container {
            position: relative;
            width: 100%;
            height: 520px;
        }
        @media (min-width: 768px) {
            .calendar-container {
                height: 650px;
            }
        }
        .calendar-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        
        .modal-backdrop {
            display: none !important;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 29, 61, 0.6);
            z-index: 50;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            max-height: 90vh;
            overflow-y: auto;
        }

        .swal2-styled.swal2-confirm {
            background-color: #003566 !important;
            border-radius: 0.75rem !important;
            padding: 0.75rem 2rem !important;
            font-family: 'Prompt', sans-serif !important;
        }
        .swal2-popup {
            border-radius: 1.5rem !important;
            font-family: 'Prompt', sans-serif !important;
        }
    </style>
</head>
<body>

    <div class="relative banner-meeting-bg text-white py-4 md:py-6 px-4 shadow-xl border-b-4 border-[#003566]">
        <div class="relative z-10 max-w-6xl mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 text-left">
                <div class="bg-white p-1 rounded-full shadow-md w-12 h-12 md:w-16 md:h-16 flex items-center justify-center border-2 border-blue-200 flex-shrink-0">
                    <img src="https://raw.githubusercontent.com/phiman-2026/picture/main/logo%20phiman.png" alt="โลโก้โรงเรียนพิมานพิทยาสรรค์" class="w-full h-full object-contain">
                </div>
                <div>
                    <h1 class="text-lg md:text-2xl font-bold tracking-wide drop-shadow-md">ระบบจองห้องประชุมออนไลน์</h1>
                    <p class="text-xs md:text-sm text-blue-200 font-light italic">โรงเรียนพิมานพิทยาสรรค์</p>
                </div>
            </div>
            <div class="hidden sm:block text-blue-300 opacity-40 text-2xl md:text-3xl">
                <i class="fa-solid fa-hotel"></i>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-3 py-4 md:py-6">
        
        <div class="grid grid-cols-3 bg-[#001d3d] p-1.5 rounded-2xl shadow-lg mb-4 md:mb-6 border border-[#003566]">
            <button onclick="switchTab('room1')" id="btn-room1" class="tab-btn py-3 px-1 text-center text-xs sm:text-base font-semibold rounded-xl transition-all duration-300 bg-white text-[#001d3d] shadow flex flex-col sm:flex-row items-center justify-center gap-1">
                <i class="fa-solid fa-hotel text-sm sm:text-base"></i><span>ศรีพิมาน</span>
            </button>
            <button onclick="switchTab('room2')" id="btn-room2" class="tab-btn py-3 px-1 text-center text-xs sm:text-base font-semibold rounded-xl transition-all duration-300 text-white hover:bg-blue-800/50 flex flex-col sm:flex-row items-center justify-center gap-1">
                <i class="fa-solid fa-chalkboard-user text-sm sm:text-base"></i><span>คำแสด</span>
            </button>
            <button onclick="switchTab('room3')" id="btn-room3" class="tab-btn py-3 px-1 text-center text-xs sm:text-base font-semibold rounded-xl transition-all duration-300 text-white hover:bg-blue-800/50 flex flex-col sm:flex-row items-center justify-center gap-1">
                <i class="fa-solid fa-display text-sm sm:text-base"></i><span>เทาแดงฯ</span>
            </button>
        </div>

        <div class="bg-white rounded-2xl md:rounded-3xl shadow-xl border border-blue-100 p-4 md:p-6 mb-6">
            
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b-2 border-blue-50 pb-4 mb-4 md:mb-6 gap-3">
                <div>
                    <h2 id="current-room-title" class="text-xl md:text-2xl font-bold text-[#001d3d]">
                        <i class="fa-solid fa-door-open text-blue-600 mr-2"></i>ห้องประชุมศรีพิมาน
                    </h2>
                    <p id="current-room-location" class="text-sm text-gray-600 mt-1">อาคารเรียน 4</p>
                </div>
                
                <button onclick="openBookingModal()" class="w-full sm:w-auto bg-gradient-to-r from-blue-600 to-[#003566] hover:from-[#003566] hover:to-blue-600 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-all transform active:scale-95 flex items-center justify-center gap-2 text-sm sm:text-base animate-pulse">
                    <i class="fa-regular fa-calendar-plus text-lg"></i>
                    <span>กดเพื่อจองห้องประชุมนี้</span>
                </button>
            </div>

            <div class="w-full">
                <h3 class="text-base font-bold text-gray-800 mb-3 flex items-center">
                    <span class="w-1.5 h-5 bg-[#001d3d] rounded-full mr-2"></span>
                    ตารางตรวจสอบวันว่างการใช้ห้องประชุม
                </h3>
                <div class="calendar-wrapper">
                    <div class="calendar-container">
                        <iframe id="room-calendar-frame" src="https://calendar.google.com/calendar/embed?src=c_3b23817944a47f6ba053f7714168acd9052c84af7adf8857ee3f557be81ba07f%40group.calendar.google.com&ctz=Asia%2FBangkok&mode=MONTH"></iframe>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="bookingModal" class="modal-backdrop flex items-center justify-center p-2 sm:p-3">
        <div class="bg-white w-full max-w-2xl rounded-2xl md:rounded-3xl shadow-2xl border border-blue-200 modal-content animate-fadeIn">
            
            <div class="bg-[#001d3d] text-white p-3 md:p-5 rounded-t-2xl md:rounded-t-3xl flex justify-between items-center sticky top-0 z-10 shadow whitespace-nowrap">
                <h3 class="text-[11px] sm:text-sm md:text-lg font-bold flex items-center overflow-hidden text-ellipsis">
                    <i class="fa-regular fa-calendar-check mr-1.5 text-blue-400 text-sm md:text-lg"></i>
                    ฟอร์มขอใช้: <span id="modal-room-name" class="text-amber-300 ml-1">ห้องประชุมศรีพิมาน</span>
                </h3>
                <button onclick="closeBookingModal()" class="text-gray-300 hover:text-white transition-all text-base md:text-xl p-1 bg-white/10 hover:bg-white/20 rounded-full w-6 h-6 md:w-8 md:h-8 flex items-center justify-center ml-2 flex-shrink-0">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <form id="bookingForm" onsubmit="handleFormSubmit(event)" class="p-4 md:p-6 space-y-4 text-sm">
                <input type="hidden" id="form-roomType" value="room1">

                <div id="email-field-wrapper">
                    <label class="block text-gray-700 font-medium mb-1"><i class="fa-regular fa-envelope mr-1 text-slate-400"></i>อีเมลผู้จอง (สำหรับห้องศรีพิมาน) <span class="text-red-500">*</span></label>
                    <input type="email" id="userEmail" required class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 bg-white" placeholder="example@gmail.com">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-medium mb-1"><i class="fa-regular fa-user mr-1 text-slate-400"></i>ชื่อ-สกุล ผู้จอง <span class="text-red-500">*</span></label>
                        <input type="text" id="userName" required class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 bg-white">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-1"><i class="fa-solid fa-phone mr-1 text-slate-400"></i>เบอร์โทรศัพท์ติดต่อกลับ <span class="text-red-500">*</span></label>
                        <input type="text" id="userPhone" required class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 bg-white" placeholder="เช่น 0812345678">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 font-medium mb-1"><i class="fa-solid fa-users-rectangle mr-1 text-slate-400"></i>กลุ่มงาน/กลุ่มสาระฯ/หน่วยงาน <span class="text-red-500">*</span></label>
                    <input type="text" id="department" required class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 bg-white">
                </div>

                <div>
                    <label class="block text-gray-700 font-medium mb-1"><i class="fa-regular fa-comment-dots mr-1 text-slate-400"></i>หัวข้อการประชุม <span class="text-red-500">*</span></label>
                    <input type="text" id="eventTitle" required class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 bg-white" placeholder="เช่น ประชุมชี้แจงการจัดการศึกษาประจำปี">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-medium mb-1"><i class="fa-regular fa-calendar-days mr-1 text-slate-400"></i>วันที่เริ่ม <span class="text-red-500">*</span></label>
                        <input type="date" id="startDate" required class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 bg-white">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-1"><i class="fa-regular fa-calendar-xmark mr-1 text-slate-400"></i>วันที่สิ้นสุด <span class="text-red-500">*</span></label>
                        <input type="date" id="endDate" required class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 bg-white">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-medium mb-1"><i class="fa-regular fa-clock mr-1 text-slate-400"></i>เวลาเริ่ม <span class="text-red-500">*</span></label>
                        <input type="time" id="startTime" required class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 bg-white">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-1"><i class="fa-regular fa-clock mr-1 text-slate-400"></i>เวลาเลิก <span class="text-red-500">*</span></label>
                        <input type="time" id="endTime" required class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 bg-white">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-medium mb-1"><i class="fa-solid fa-people-group mr-1 text-slate-400"></i>จำนวนผู้เข้าร่วม (คน) <span class="text-red-500">*</span></label>
                        <input type="number" id="userCount" required min="1" class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 bg-white">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-1"><i class="fa-solid fa-photo-film mr-1 text-slate-400"></i>สื่ออุปกรณ์ที่ต้องการใช้ <span class="text-red-500">*</span></label>
                        <input type="text" id="mediaEquipment" required class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 bg-white" placeholder="เช่น จอ LED, ไมโครโฟน, ไม่มี">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 font-medium mb-1"><i class="fa-regular fa-note-sticky mr-1 text-slate-400"></i>หมายเหตุเพิ่มเติม</label>
                    <textarea id="note" rows="2" class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 bg-white"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-2 pt-2 border-t text-center font-bold whitespace-nowrap">
                    <button type="button" onclick="closeBookingModal()" class="w-full bg-slate-200 hover:bg-slate-300 text-gray-700 py-3 px-2 rounded-xl shadow transition-all active:scale-95 text-xs sm:text-base">
                        ยกเลิก
                    </button>
                    <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-[#003566] to-[#001d3d] hover:from-[#001d3d] hover:to-[#003566] text-white py-3 px-1 sm:px-4 rounded-xl shadow transition-all transform active:scale-95 flex items-center justify-center gap-1 text-[11px] sm:text-base">
                        <i id="btn-icon" class="fa-regular fa-paper-plane text-xs sm:text-base"></i>
                        <span id="btn-text">ยืนยันส่งข้อมูลการจอง</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <footer class="bg-[#001d3d] text-blue-300 py-6 px-4 text-center text-xs md:text-sm border-t border-[#003566]">
        <div class="max-w-4xl mx-auto">
            <p class="mb-1 text-white font-medium">กลุ่มงานบริหารทั่วไป โรงเรียนพิมานพิทยาสรรค์</p>
            <p>สำนักงานเขตพื้นที่การศึกษามัธยมศึกษาสงขลา สตูล</p>
        </div>
    </footer>

    <script>
        const roomData = {
            'room1': {
                name: 'ห้องประชุมศรีพิมาน',
                title: '<i class="fa-solid fa-door-open text-blue-600 mr-2"></i>ห้องประชุมศรีพิมาน',
                location: 'อาคารเรียน 4',
                calendarUrl: 'https://calendar.google.com/calendar/embed?src=c_3b23817944a47f6ba053f7714168acd9052c84af7adf8857ee3f557be81ba07f%40group.calendar.google.com&ctz=Asia%2FBangkok&mode=MONTH'
            },
            'room2': {
                name: 'ห้องประชุมคำแสด',
                title: '<i class="fa-solid fa-door-open text-blue-600 mr-2"></i>ห้องประชุมคำแสด',
                location: 'ชั้น 2 อาคารเรียน 1',
                calendarUrl: 'https://calendar.google.com/calendar/embed?src=c_e33aaa3381687c846f5d61d2e4f49162b802063dcbbd8df99eec54500f37de74%40group.calendar.google.com&ctz=Asia%2FBangkok&mode=MONTH'
            },
            'room3': {
                name: 'ห้องประชุมเทาแดงรำลึก',
                title: '<i class="fa-solid fa-door-open text-blue-600 mr-2"></i>ห้องประชุมเทาแดงรำลึก',
                location: 'อาคารเรียน 3',
                calendarUrl: 'https://calendar.google.com/calendar/embed?src=c_9f59737ccd4dfa2f554d75e7f439f44c967f01830a9e7123781c3f9f1b5b8616%40group.calendar.google.com&ctz=Asia%2FBangkok&mode=MONTH'
            }
        };

        function openBookingModal() {
            const currentRoom = document.getElementById('form-roomType').value;
            document.getElementById('modal-room-name').innerText = roomData[currentRoom].name;
            
            const modal = document.getElementById('bookingModal');
            modal.style.setProperty('display', 'flex', 'important'); 
            document.body.style.overflow = 'hidden'; 
        }

        function closeBookingModal() {
            const modal = document.getElementById('bookingModal');
            modal.style.setProperty('display', 'none', 'important'); 
            document.body.style.overflow = 'auto'; 
        }

        // นำโค้ดเดิมทั้งหมดมาครอบ ทำงานได้ 3 ห้องเหมือนเดิมไม่มีเปลี่ยนไอดี
        function switchTab(roomId) {
            document.getElementById('current-room-title').innerHTML = roomData[roomId].title;
            document.getElementById('current-room-location').innerText = roomData[roomId].location;
            document.getElementById('room-calendar-frame').src = roomData[roomId].calendarUrl;
            
            document.getElementById('form-roomType').value = roomId;

            const emailWrapper = document.getElementById('email-field-wrapper');
            const emailInput = document.getElementById('userEmail');
            if (roomId === 'room1') {
                emailWrapper.style.display = 'block';
                emailInput.required = true;
            } else {
                emailWrapper.style.display = 'none';
                emailInput.required = false;
            }

            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => {
                btn.classList.remove('bg-white', 'text-[#001d3d]', 'shadow');
                btn.classList.add('text-white', 'hover:bg-blue-800/50');
            });

            const activeBtn = document.getElementById('btn-' + roomId);
            activeBtn.classList.remove('text-white', 'hover:bg-blue-800/50');
            activeBtn.classList.add('bg-white', 'text-[#001d3d]', 'shadow');
        }

        function handleFormSubmit(event) {
            event.preventDefault();
            
            const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz859N_EKsvoIViOk4T1FEvJq0NA0KQ7_PKpixpKPgpZove6upWuQZo68gTBNjrrbJD6w/exec"; 

            const submitBtn = document.getElementById('submitBtn');
            const btnIcon = document.getElementById('btn-icon');
            const btnText = document.getElementById('btn-text');

            const rawStart = document.getElementById('startDate').value;
            const rawEnd = document.getElementById('endDate').value;
            
            if(!rawStart || !rawEnd) {
                Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบถ้วน', text: 'กรุณาระบุวันที่เริ่มและสิ้นสุดให้ถูกต้องค่ะ' });
                return;
            }

            submitBtn.disabled = true;
            btnIcon.className = "fa-solid fa-spinner fa-spin";
            btnText.innerText = "กำลังส่งข้อมูล...";

            const rawPhone = document.getElementById('userPhone').value;
            const safePhone = rawPhone.startsWith("'") ? rawPhone : "'" + rawPhone; 

            const finalEmail = document.getElementById('form-roomType').value === 'room1' ? document.getElementById('userEmail').value : "-";

            const payload = {
                roomType: document.getElementById('form-roomType').value,
                userEmail: finalEmail,
                userName: document.getElementById('userName').value,
                userPhone: safePhone, 
                department: document.getElementById('department').value,
                eventTitle: document.getElementById('eventTitle').value,
                startDate: rawStart, 
                endDate: rawEnd,     
                startTime: document.getElementById('startTime').value,
                endTime: document.getElementById('endTime').value,
                userCount: document.getElementById('userCount').value,
                mediaEquipment: document.getElementById('mediaEquipment').value,
                note: document.getElementById('note').value
            };

            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(() => {
                // 🛠️ ปรับแก้ตรงนี้: ข้อความกระชับ คลีน สวยตามสั่ง มีแค่คำว่า บันทึกการจองสำเร็จค่ะ
                Swal.fire({
                    icon: 'success',
                    title: 'บันทึกการจองสำเร็จค่ะ',
                    confirmButtonText: 'ตกลง',
                    customClass: {
                        popup: 'swal2-popup',
                        confirmButton: 'swal2-styled swal2-confirm'
                    }
                });

                document.getElementById('bookingForm').reset();
                closeBookingModal(); 
                
                const currentRoom = document.getElementById('form-roomType').value;
                switchTab(currentRoom);
            })
            .catch(error => {
                console.error("Error:", error);
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด!',
                    text: 'ไม่สามารถเชื่อมต่อระบบหลังบ้านได้ กรุณาลองใหม่อีกครั้งค่ะ',
                    confirmButtonText: 'รับทราบ'
                });
            })
            .finally(() => {
                submitBtn.disabled = false;
                btnIcon.className = "fa-regular fa-paper-plane text-xs sm:text-base";
                btnText.innerText = "ยืนยันส่งข้อมูลการจอง";
            });
        }
    </script>
</body>
</html>
